<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Отслеживание подписок</title>
    <!-- PWA манифест (исправлен путь) -->
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22:%22Подписки%22,
        %22short_name%22:%22Subscriptions%22,
        %22start_url%22:%22./%22,
        %22display%22:%22standalone%22,
        %22background_color%22:%22%23f2f2f7%22,
        %22theme_color%22:%22%23007aff%22,
        %22icons%22:[{
            %22src%22:%22data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjMDA3YWZmIi8+CjxwYXRoIGQ9Ik0xMjAgODBDMTIwIDY5LjQ0OCA5MC41NTIgNDggNjQgNDhDOC4yODQzIDQ4IDAgNTYuMjg0MyAwIDgzLjk2OUMwIDExMS42MzUgOC4yODQzIDEyMCA2NCAxMjBDMTE5LjcxNiAxMjAgMTI4IDEuMTEwNSUxMjggODBaIiBmaWxsPSJ3aGl0ZSIvPgo8L3N2Zz4=%22,
            %22sizes%22:%22192x192%22,
            %22type%22:%22image/svg+xml%22
        }]
    }">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Подписки">
    <meta name="theme-color" content="#007aff">
    <style>
        /* ----- iOS 26 Liquid Glass Theme ----- */
        :root {
            --primary-blue: #007aff;
            --glass-bg-light: rgba(255, 255, 255, 0.45);
            --glass-bg-dark: rgba(30, 30, 32, 0.55);
            --glass-border-light: rgba(255, 255, 255, 0.6);
            --glass-border-dark: rgba(120, 120, 128, 0.2);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(165deg, #e9ecf2 0%, #d9dee8 100%);
            min-height: 100vh;
            color: #1c1c1e;
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
        }

        /* Тёмная тема */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(145deg, #101114 0%, #1c1c20 100%);
                color: #ffffff;
            }
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1c1c1e, #3a3a3c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        @media (prefers-color-scheme: dark) {
            h1 {
                background: linear-gradient(135deg, #ffffff, #b0b0b8);
                -webkit-background-clip: text;
                background-clip: text;
            }
        }

        /* Плашка с месячной суммой */
        .monthly-summary {
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--glass-border-light);
            border: 0.5px solid rgba(255,255,255,0.3);
            transition: all 0.2s ease;
        }
        @media (prefers-color-scheme: dark) {
            .monthly-summary {
                background: var(--glass-bg-dark);
                box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--glass-border-dark);
                border-color: rgba(255,255,255,0.05);
            }
        }

        .summary-label {
            font-size: 15px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
            margin-bottom: 6px;
        }

        .summary-amount {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: #1c1c1e;
        }
        @media (prefers-color-scheme: dark) {
            .summary-amount {
                color: white;
            }
        }

        .summary-note {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 6px;
        }

        /* Карточки подписок — жидкое стекло */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card {
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 28px;
            padding: 22px 20px;
            color: #1c1c1e;
            position: relative;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1), box-shadow 0.3s;
            box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--glass-border-light);
            border: 0.5px solid rgba(255,255,255,0.4);
            overflow: hidden;
        }
        @media (prefers-color-scheme: dark) {
            .card {
                background: var(--glass-bg-dark);
                box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--glass-border-dark);
                border-color: rgba(255,255,255,0.08);
                color: #ffffff;
            }
        }

        /* Жидкий блеск (градиентная подсветка) */
        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 25%, rgba(255,255,255,0.5) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border-radius: 28px;
        }
        .card:hover::after {
            opacity: 0.5;
        }
        @media (prefers-color-scheme: dark) {
            .card::after {
                background: radial-gradient(circle at 20% 25%, rgba(255,255,255,0.15) 0%, transparent 70%);
            }
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.6);
        }

        .card.editing {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(40px);
            color: #1c1c1e;
            border: 1px solid rgba(255,255,255,0.8);
        }
        @media (prefers-color-scheme: dark) {
            .card.editing {
                background: rgba(44,44,48,0.8);
                color: white;
                border-color: rgba(255,255,255,0.1);
            }
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .card-amount {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: inherit;
        }

        .card-date {
            font-size: 15px;
            opacity: 0.8;
            margin-bottom: 12px;
            font-weight: 450;
        }

        .card-days {
            font-size: 44px;
            font-weight: 800;
            text-align: right;
            margin-top: 6px;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .card-days.urgent {
            color: #ff3b30;
            text-shadow: 0 0 10px rgba(255,59,48,0.3);
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 12px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.15s;
            background: rgba(255,255,255,0.5);
            color: #1c1c1e;
            border: 0.5px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        @media (prefers-color-scheme: dark) {
            .btn {
                background: rgba(60,60,65,0.6);
                color: white;
                border-color: rgba(255,255,255,0.1);
            }
        }
        .btn:active {
            transform: scale(0.97);
        }

        .btn-edit {
            background: rgba(255,255,255,0.35);
        }
        .btn-delete {
            background: rgba(255,59,48,0.15);
            color: #ff3b30;
            border-color: rgba(255,59,48,0.3);
        }
        @media (prefers-color-scheme: dark) {
            .btn-delete {
                background: rgba(255,69,58,0.2);
                color: #ff453a;
            }
        }

        /* Кнопка добавления */
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 40px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            color: #007aff;
            border: 1px solid rgba(255,255,255,0.8);
            font-size: 32px;
            font-weight: 300;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        @media (prefers-color-scheme: dark) {
            .add-btn {
                background: rgba(44,44,48,0.8);
                border-color: rgba(255,255,255,0.1);
                color: #0a84ff;
            }
        }
        .add-btn:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.9);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2000;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 36px;
            padding: 32px 28px;
            max-width: 92vw;
            width: 380px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.8);
            border: 0.5px solid rgba(255,255,255,0.5);
        }
        @media (prefers-color-scheme: dark) {
            .modal-content {
                background: rgba(30,30,34,0.85);
                box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.05);
                color: white;
            }
        }

        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
            opacity: 0.8;
            letter-spacing: -0.01em;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(120,120,128,0.2);
            border-radius: 20px;
            font-size: 17px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            color: #1c1c1e;
            outline: none;
            transition: border 0.15s;
        }
        @media (prefers-color-scheme: dark) {
            .form-group input, .form-group select {
                background: rgba(20,20,24,0.6);
                color: white;
                border-color: rgba(255,255,255,0.1);
            }
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #007aff;
        }

        .form-buttons {
            display: flex;
            gap: 14px;
            margin-top: 28px;
        }
        .btn-save {
            background: #007aff;
            color: white;
            border: none;
            flex: 1;
            font-weight: 600;
        }
        .btn-cancel {
            background: rgba(120,120,128,0.15);
            color: #1c1c1e;
            flex: 1;
        }
        @media (prefers-color-scheme: dark) {
            .btn-cancel {
                color: white;
                background: rgba(70,70,75,0.6);
            }
        }

        /* Адаптивные отступы */
        @supports (padding: max(0px)) {
            body { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
            .add-btn { bottom: max(30px, calc(env(safe-area-inset-bottom) + 20px)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Подписки</h1>
        <!-- Плашка с суммарной стоимостью в месяц -->
        <div class="monthly-summary" id="monthlySummary">
            <div class="summary-label">Расходы в месяц</div>
            <div class="summary-amount" id="totalMonthlyAmount">0 ₽</div>
        </div>

        <div class="cards" id="cards"></div>
    </div>
    <button class="add-btn" onclick="openModal()">+</button>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom:24px; font-weight:700;">Новая подписка</h2>
            <form id="subscription-form">
                <div class="form-group">
                    <label>Название сервиса</label>
                    <input type="text" id="name" required placeholder="Например, Apple Music">
                </div>
                <div class="form-group">
                    <label>Стоимость (₽)</label>
                    <input type="number" id="amount" min="0" step="0.01" required placeholder="299">
                </div>
                <div class="form-group">
                    <label>Периодичность</label>
                    <select id="period">
                        <option value="week">Неделя</option>
                        <option value="month" selected>Месяц</option>
                        <option value="year">Год</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Дата следующего платежа</label>
                    <input type="date" id="next-payment" required>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-save">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function(){
            // ---------- Основные данные ----------
            let subscriptions = JSON.parse(localStorage.getItem('subscriptions')) || [];
            let editingId = null;

            // ---------- Вспомогательные функции ----------
            function saveToStorage() {
                localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            }

            // Вычисление следующей даты платежа
            function calculateNextPayment(currentDate, period) {
                const next = new Date(currentDate);
                if (period === 'week') {
                    next.setDate(next.getDate() + 7);
                } else if (period === 'month') {
                    next.setMonth(next.getMonth() + 1);
                } else if (period === 'year') {
                    next.setFullYear(next.getFullYear() + 1);
                }
                return next;
            }

            // Дней до даты
            function daysUntil(date) {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                const target = new Date(date);
                target.setHours(0, 0, 0, 0);
                const diffTime = target - now;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            }

            // ---------- Автоматическое продление просроченных подписок ----------
            function refreshOverdueSubscriptions() {
                let changed = false;
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                for (let sub of subscriptions) {
                    let paymentDate = new Date(sub.nextPayment);
                    paymentDate.setHours(0, 0, 0, 0);
                    let days = daysUntil(paymentDate);
                    
                    // Пока дата меньше или равна сегодня (включая отрицательные дни), сдвигаем
                    while (days <= 0) {
                        const newDate = calculateNextPayment(paymentDate, sub.period);
                        paymentDate = new Date(newDate);
                        paymentDate.setHours(0, 0, 0, 0);
                        days = daysUntil(paymentDate);
                        changed = true;
                    }
                    
                    // Обновляем только если дата изменилась
                    if (changed) {
                        sub.nextPayment = paymentDate.toISOString().split('T')[0];
                    }
                }
                
                if (changed) {
                    saveToStorage();
                }
                return changed;
            }

            // ---------- Расчёт месячной суммы ----------
            function calculateMonthlyTotal() {
                return subscriptions.reduce((total, sub) => {
                    const amount = parseFloat(sub.amount) || 0;
                    switch (sub.period) {
                        case 'week': return total + (amount * 4);
                        case 'month': return total + amount;
                        case 'year': return total + (amount / 12);
                        default: return total;
                    }
                }, 0);
            }

            function updateMonthlySummary() {
                const total = calculateMonthlyTotal();
                const formatted = total.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ₽';
                document.getElementById('totalMonthlyAmount').textContent = formatted;
            }

            // ---------- Рендер карточек ----------
            function renderCards() {
                // Сначала гарантируем, что все даты актуальны
                refreshOverdueSubscriptions();
                
                const container = document.getElementById('cards');
                // Сортировка по дням до платежа (возрастание)
                const sorted = [...subscriptions].sort((a, b) => {
                    return daysUntil(new Date(a.nextPayment)) - daysUntil(new Date(b.nextPayment));
                });
                
                container.innerHTML = sorted.map(sub => {
                    const days = daysUntil(new Date(sub.nextPayment));
                    const dateStr = new Date(sub.nextPayment).toLocaleDateString('ru-RU', {
                        day: 'numeric', month: 'long', year: 'numeric'
                    });
                    const urgent = days <= 3;
                    
                    return `
                        <div class="card" onclick="editSubscription('${sub.id}')">
                            <div class="card-title">${escapeHtml(sub.name) || 'Без названия'}</div>
                            <div class="card-amount">${parseFloat(sub.amount).toFixed(0)} ₽</div>
                            <div class="card-date">📅 ${dateStr}</div>
                            <div class="card-days ${urgent ? 'urgent' : ''}">${days} ${getDaysWord(days)}</div>
                            <div class="card-buttons">
                                <button class="btn btn-edit" onclick="event.stopPropagation(); editSubscription('${sub.id}')">Изменить</button>
                                <button class="btn btn-delete" onclick="event.stopPropagation(); deleteSubscription('${sub.id}')">Удалить</button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Обновляем плашку суммы
                updateMonthlySummary();
            }

            // Простая защита от XSS
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function getDaysWord(days) {
                const absDays = Math.abs(days);
                const lastDigit = absDays % 10;
                const lastTwo = absDays % 100;
                if (lastTwo >= 11 && lastTwo <= 14) return 'дней';
                if (lastDigit === 1) return 'день';
                if (lastDigit >= 2 && lastDigit <= 4) return 'дня';
                return 'дней';
            }

            // ---------- Модальное окно ----------
            window.openModal = function(id = null) {
                editingId = id;
                const modal = document.getElementById('modal');
                const title = document.getElementById('modal-title');
                const form = document.getElementById('subscription-form');
                
                if (id) {
                    const sub = subscriptions.find(s => s.id === id);
                    if (sub) {
                        document.getElementById('name').value = sub.name;
                        document.getElementById('amount').value = sub.amount;
                        document.getElementById('period').value = sub.period;
                        document.getElementById('next-payment').value = sub.nextPayment;
                        title.textContent = 'Изменить подписку';
                    }
                } else {
                    form.reset();
                    // Установить завтрашнюю дату по умолчанию
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    document.getElementById('next-payment').valueAsDate = tomorrow;
                    title.textContent = 'Новая подписка';
                }
                modal.classList.add('active');
            };

            window.closeModal = function() {
                document.getElementById('modal').classList.remove('active');
                editingId = null;
            };

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
            }

            // Обработка формы
            document.getElementById('subscription-form').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const nameInput = document.getElementById('name');
                const amountInput = document.getElementById('amount');
                const periodSelect = document.getElementById('period');
                const dateInput = document.getElementById('next-payment');
                
                const data = {
                    id: editingId || generateId(),
                    name: nameInput.value.trim(),
                    amount: parseFloat(amountInput.value) || 0,
                    period: periodSelect.value,
                    nextPayment: dateInput.value
                };
                
                if (!data.name || data.amount <= 0) {
                    alert('Введите название и корректную стоимость');
                    return;
                }
                
                if (editingId) {
                    const index = subscriptions.findIndex(s => s.id === editingId);
                    if (index !== -1) subscriptions[index] = data;
                } else {
                    subscriptions.push(data);
                }
                
                saveToStorage();
                closeModal();
                renderCards();
            });

            window.editSubscription = function(id) {
                openModal(id);
            };

            window.deleteSubscription = function(id) {
                if (confirm('Удалить подписку?')) {
                    subscriptions = subscriptions.filter(s => s.id !== id);
                    saveToStorage();
                    renderCards();
                }
            };

            // ---------- Инициализация ----------
            // Регистрация Service Worker (упрощённо, для офлайн-кэша)
            if ('serviceWorker' in navigator) {
                // Вместо странного base64 создадим простой скрипт для кэширования
                const swCode = `
                    const CACHE = 'subscriptions-v2';
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE).then(cache => cache.addAll(['./'])));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.warn('SW registration skipped'));
            }

            // Первичный рендер
            renderCards();

            // Автоматическое обновление дат при загрузке (уже вызвано в renderCards)
            // Дополнительно можно периодически обновлять (раз в час)
            setInterval(() => {
                // Проверяем, не нужно ли продлить подписки
                if (refreshOverdueSubscriptions()) {
                    renderCards();
                } else {
                    // Просто перерисовываем для обновления счётчика дней (без изменений дат)
                    renderCards();
                }
            }, 3600000); // каждый час
            
            // И сразу же при возвращении на вкладку (visibility change)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    renderCards();
                }
            });
        })();
    </script>
</body>
</html>
