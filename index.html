    <style>
        /* ----- iOS 26 Liquid Glass Theme ----- */
        :root {
            --primary-blue: #007aff;
            --glass-bg-light: rgba(255, 255, 255, 0.45);
            --glass-bg-dark: rgba(30, 30, 32, 0.55);
            --glass-border-light: rgba(255, 255, 255, 0.6);
            --glass-border-dark: rgba(120, 120, 128, 0.2);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            --header-height: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(165deg, #e9ecf2 0%, #d9dee8 100%);
            min-height: 100vh;
            color: #1c1c1e;
            padding-top: var(--header-height);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(145deg, #101114 0%, #1c1c20 100%);
                color: #ffffff;
            }
        }

        /* ----- ЗАФИКСИРОВАННАЯ ВЕРХНЯЯ ПАНЕЛЬ (не скроллится) ----- */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow: 0 1px 0 rgba(0,0,0,0.05), inset 0 0 0 0.5px var(--glass-border-light);
            border-bottom: 0.5px solid rgba(255,255,255,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            padding-right: max(20px, env(safe-area-inset-right));
            padding-left: max(20px, env(safe-area-inset-left));
        }
        @media (prefers-color-scheme: dark) {
            .app-header {
                background: var(--glass-bg-dark);
                border-bottom-color: rgba(255,255,255,0.05);
                box-shadow: 0 1px 0 rgba(0,0,0,0.2), inset 0 0 0 0.5px var(--glass-border-dark);
            }
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1c1c1e;
            flex: 1;
        }
        @media (prefers-color-scheme: dark) {
            .header-title {
                color: white;
            }
        }

        .header-add-btn {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow-sm);
            color: var(--primary-blue);
            font-size: 28px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            line-height: 1;
            padding-bottom: 4px;
        }
        @media (prefers-color-scheme: dark) {
            .header-add-btn {
                background: rgba(60,60,65,0.6);
                border-color: rgba(255,255,255,0.1);
                color: #0a84ff;
            }
        }
        .header-add-btn:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.9);
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        /* Плашка с расходами — месяц + год */
        .monthly-summary {
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--glass-border-light);
            border: 0.5px solid rgba(255,255,255,0.3);
            transition: all 0.2s ease;
        }
        @media (prefers-color-scheme: dark) {
            .monthly-summary {
                background: var(--glass-bg-dark);
                box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--glass-border-dark);
                border-color: rgba(255,255,255,0.05);
            }
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .summary-label {
            font-size: 17px;
            font-weight: 500;
            opacity: 0.7;
        }
        .summary-amount {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #1c1c1e;
        }
        @media (prefers-color-scheme: dark) {
            .summary-amount {
                color: white;
            }
        }

        .yearly-row {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 0.5px solid rgba(120,120,128,0.15);
        }
        .yearly-label {
            font-size: 15px;
            opacity: 0.6;
            font-weight: 450;
        }
        .yearly-amount {
            font-size: 22px;
            font-weight: 700;
            opacity: 0.9;
        }

        /* Карточки подписок — жидкое стекло */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card {
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 28px;
            padding: 22px 20px;
            color: #1c1c1e;
            position: relative;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1), box-shadow 0.3s;
            box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--glass-border-light);
            border: 0.5px solid rgba(255,255,255,0.4);
            overflow: hidden;
        }
        @media (prefers-color-scheme: dark) {
            .card {
                background: var(--glass-bg-dark);
                box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--glass-border-dark);
                border-color: rgba(255,255,255,0.08);
                color: #ffffff;
            }
        }

        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 25%, rgba(255,255,255,0.5) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border-radius: 28px;
        }
        .card:hover::after {
            opacity: 0.5;
        }
        @media (prefers-color-scheme: dark) {
            .card::after {
                background: radial-gradient(circle at 20% 25%, rgba(255,255,255,0.15) 0%, transparent 70%);
            }
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.6);
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .card-amount {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: inherit;
        }

        .card-date {
            font-size: 15px;
            opacity: 0.8;
            margin-bottom: 12px;
            font-weight: 450;
        }

        .card-days {
            font-size: 44px;
            font-weight: 800;
            text-align: right;
            margin-top: 6px;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .card-days.urgent {
            color: #ff3b30;
            text-shadow: 0 0 10px rgba(255,59,48,0.3);
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 12px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.15s;
            background: rgba(255,255,255,0.5);
            color: #1c1c1e;
            border: 0.5px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        @media (prefers-color-scheme: dark) {
            .btn {
                background: rgba(60,60,65,0.6);
                color: white;
                border-color: rgba(255,255,255,0.1);
            }
        }
        .btn:active {
            transform: scale(0.97);
        }

        .btn-edit {
            background: rgba(255,255,255,0.35);
        }
        .btn-delete {
            background: rgba(255,59,48,0.15);
            color: #ff3b30;
            border-color: rgba(255,59,48,0.3);
        }
        @media (prefers-color-scheme: dark) {
            .btn-delete {
                background: rgba(255,69,58,0.2);
                color: #ff453a;
            }
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2000;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 36px;
            padding: 32px 28px;
            max-width: 92vw;
            width: 380px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.8);
            border: 0.5px solid rgba(255,255,255,0.5);
        }
        @media (prefers-color-scheme: dark) {
            .modal-content {
                background: rgba(30,30,34,0.85);
                box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.05);
                color: white;
            }
        }

        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
            opacity: 0.8;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(120,120,128,0.2);
            border-radius: 20px;
            font-size: 17px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            color: #1c1c1e;
            outline: none;
        }
        @media (prefers-color-scheme: dark) {
            .form-group input, .form-group select {
                background: rgba(20,20,24,0.6);
                color: white;
                border-color: rgba(255,255,255,0.1);
            }
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #007aff;
        }

        /* Исправление: выравнивание текста в поле даты по левому краю */
        input[type="date"] {
            text-align: left;
            -webkit-appearance: none;
            appearance: none;
        }
        /* Для iOS корректируем отображение */
        input[type="date"]::-webkit-date-and-time-value {
            text-align: left;
        }

        /* Стили для блока с выбором количества периодов */
        .period-quantity-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .period-select {
            flex: 2;
        }
        .quantity-input {
            flex: 1;
        }
        .quantity-input input {
            text-align: center;
        }

        .form-buttons {
            display: flex;
            gap: 14px;
            margin-top: 28px;
        }
        .btn-save {
            background: #007aff;
            color: white;
            border: none;
            flex: 1;
        }
        .btn-cancel {
            background: rgba(120,120,128,0.15);
            color: #1c1c1e;
            flex: 1;
        }
        @media (prefers-color-scheme: dark) {
            .btn-cancel {
                color: white;
                background: rgba(70,70,75,0.6);
            }
        }
    </style>
</head>
<body>
    <!-- ЗАФИКСИРОВАННЫЙ ХЕДЕР -->
    <header class="app-header">
        <div class="header-title">Мои подписки</div>
        <div class="header-add-btn" onclick="openModal()">+</div>
    </header>

    <div class="container">
        <!-- Плашка: расходы в месяц и в год -->
        <div class="monthly-summary" id="monthlySummary">
            <div class="summary-row">
                <span class="summary-label">В месяц</span>
                <span class="summary-amount" id="totalMonthlyAmount">0 ₽</span>
            </div>
            <div class="yearly-row">
                <span class="yearly-label">В год</span>
                <span class="yearly-amount" id="totalYearlyAmount">0 ₽</span>
            </div>
        </div>

        <div class="cards" id="cards"></div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom:24px; font-weight:700;">Новая подписка</h2>
            <form id="subscription-form">
                <div class="form-group">
                    <label>Название сервиса</label>
                    <input type="text" id="name" required placeholder="Например, Apple Music">
                </div>
                <div class="form-group">
                    <label>Стоимость (₽)</label>
                    <input type="number" id="amount" min="0" step="0.01" required placeholder="299">
                </div>
                
                <!-- Блок с выбором периода и количества -->
                <div class="form-group">
                    <label>Периодичность</label>
                    <div class="period-quantity-row">
                        <select id="period" class="period-select">
                            <option value="week">Неделя</option>
                            <option value="month" selected>Месяц</option>
                            <option value="year">Год</option>
                        </select>
                        <div class="quantity-input">
                            <input type="number" id="period-count" min="1" value="1" step="1" required>
                        </div>
                    </div>
                    <div style="font-size: 13px; opacity: 0.6; margin-top: 4px;">Количество периодов</div>
                </div>

                <div class="form-group">
                    <label>Дата следующего платежа</label>
                    <input type="date" id="next-payment" required>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-save">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function(){
            let subscriptions = JSON.parse(localStorage.getItem('subscriptions')) || [];
            let editingId = null;

            function saveToStorage() {
                localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            }

            // Вычисление следующей даты с учётом множителя
            function calculateNextPayment(currentDate, period, count = 1) {
                const next = new Date(currentDate);
                const multiplier = parseInt(count) || 1;
                if (period === 'week') {
                    next.setDate(next.getDate() + (7 * multiplier));
                } else if (period === 'month') {
                    next.setMonth(next.getMonth() + multiplier);
                } else if (period === 'year') {
                    next.setFullYear(next.getFullYear() + multiplier);
                }
                return next;
            }

            function daysUntil(date) {
                const now = new Date(); now.setHours(0,0,0,0);
                const target = new Date(date); target.setHours(0,0,0,0);
                return Math.ceil((target - now) / (1000*60*60*24));
            }

            // Автопродление просроченных (с учётом periodCount)
            function refreshOverdueSubscriptions() {
                let changed = false;
                const today = new Date(); today.setHours(0,0,0,0);
                for (let sub of subscriptions) {
                    let paymentDate = new Date(sub.nextPayment); paymentDate.setHours(0,0,0,0);
                    let days = daysUntil(paymentDate);
                    const count = sub.periodCount || 1;
                    while (days <= 0) {
                        const newDate = calculateNextPayment(paymentDate, sub.period, count);
                        paymentDate = new Date(newDate); paymentDate.setHours(0,0,0,0);
                        days = daysUntil(paymentDate);
                        changed = true;
                    }
                    if (changed) sub.nextPayment = paymentDate.toISOString().split('T')[0];
                }
                if (changed) saveToStorage();
                return changed;
            }

            // Расчёт месячной суммы (неделя = сумма /7 *30)
            function calculateMonthlyTotal() {
                return subscriptions.reduce((total, sub) => {
                    const amount = parseFloat(sub.amount) || 0;
                    const count = sub.periodCount || 1;
                    switch (sub.period) {
                        case 'week': return total + ((amount / 7 * 30) / count);
                        case 'month': return total + (amount / count);
                        case 'year': return total + (amount / (12 * count));
                        default: return total;
                    }
                }, 0);
            }

            function updateSummary() {
                const monthly = calculateMonthlyTotal();
                const yearly = monthly * 12;
                const formatter = new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 });
                document.getElementById('totalMonthlyAmount').textContent = formatter.format(monthly) + ' ₽';
                document.getElementById('totalYearlyAmount').textContent = formatter.format(yearly) + ' ₽';
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function getDaysWord(days) {
                const abs = Math.abs(days);
                if (abs % 100 >= 11 && abs % 100 <= 14) return 'дней';
                if (abs % 10 === 1) return 'день';
                if (abs % 10 >= 2 && abs % 10 <= 4) return 'дня';
                return 'дней';
            }

            function renderCards() {
                refreshOverdueSubscriptions();
                const container = document.getElementById('cards');
                const sorted = [...subscriptions].sort((a,b) => daysUntil(new Date(a.nextPayment)) - daysUntil(new Date(b.nextPayment)));
                container.innerHTML = sorted.map(sub => {
                    const days = daysUntil(new Date(sub.nextPayment));
                    const dateStr = new Date(sub.nextPayment).toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
                    const urgent = days <= 3;
                    // Отображение периода с учётом множителя
                    let periodText = sub.period === 'week' ? 'нед' : (sub.period === 'month' ? 'мес' : 'год');
                    const count = sub.periodCount || 1;
                    if (count > 1) periodText = count + ' ' + periodText;
                    
                    return `
                        <div class="card" onclick="editSubscription('${sub.id}')">
                            <div class="card-title">${escapeHtml(sub.name) || 'Без названия'}</div>
                            <div class="card-amount">${parseFloat(sub.amount).toFixed(0)} ₽ / ${periodText}</div>
                            <div class="card-date">📅 ${dateStr}</div>
                            <div class="card-days ${urgent ? 'urgent' : ''}">${days} ${getDaysWord(days)}</div>
                            <div class="card-buttons">
                                <button class="btn btn-edit" onclick="event.stopPropagation(); editSubscription('${sub.id}')">Изменить</button>
                                <button class="btn btn-delete" onclick="event.stopPropagation(); deleteSubscription('${sub.id}')">Удалить</button>
                            </div>
                        </div>
                    `;
                }).join('');
                updateSummary();
            }

            window.openModal = function(id = null) {
                editingId = id;
                const modal = document.getElementById('modal');
                const title = document.getElementById('modal-title');
                const form = document.getElementById('subscription-form');
                if (id) {
                    const sub = subscriptions.find(s => s.id === id);
                    if (sub) {
                        document.getElementById('name').value = sub.name;
                        document.getElementById('amount').value = sub.amount;
                        document.getElementById('period').value = sub.period;
                        document.getElementById('period-count').value = sub.periodCount || 1;
                        document.getElementById('next-payment').value = sub.nextPayment;
                        title.textContent = 'Изменить подписку';
                    }
                } else {
                    form.reset();
                    document.getElementById('period-count').value = 1;
                    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
                    document.getElementById('next-payment').valueAsDate = tomorrow;
                    title.textContent = 'Новая подписка';
                }
                modal.classList.add('active');
            };

            window.closeModal = function() {
                document.getElementById('modal').classList.remove('active');
                editingId = null;
            };

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2,6);
            }

            document.getElementById('subscription-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('name').value.trim();
                const amount = parseFloat(document.getElementById('amount').value) || 0;
                const period = document.getElementById('period').value;
                const periodCount = parseInt(document.getElementById('period-count').value) || 1;
                const nextPayment = document.getElementById('next-payment').value;
                if (!name || amount <= 0) { alert('Введите название и корректную стоимость'); return; }
                const data = { 
                    id: editingId || generateId(), 
                    name, 
                    amount, 
                    period, 
                    periodCount,
                    nextPayment 
                };
                if (editingId) {
                    const index = subscriptions.findIndex(s => s.id === editingId);
                    if (index !== -1) subscriptions[index] = data;
                } else subscriptions.push(data);
                saveToStorage();
                closeModal();
                renderCards();
            });

            window.editSubscription = (id) => openModal(id);
            window.deleteSubscription = (id) => {
                if (confirm('Удалить подписку?')) {
                    subscriptions = subscriptions.filter(s => s.id !== id);
                    saveToStorage();
                    renderCards();
                }
            };

            // SW
            if ('serviceWorker' in navigator) {
                const swCode = `const CACHE='subs-v4';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
                const blob = new Blob([swCode], {type:'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
            }

            renderCards();
            setInterval(() => { if (refreshOverdueSubscriptions()) renderCards(); else renderCards(); }, 3600000);
            document.addEventListener('visibilitychange', () => { if (!document.hidden) renderCards(); });
        })();
    </script>
</body>
</html>
