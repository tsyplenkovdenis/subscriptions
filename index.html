    <style>
        /* ----- iOS 26 Liquid Glass Theme ----- */
        :root {
            --primary-blue: #007aff;
            --glass-bg-light: rgba(255, 255, 255, 0.45);
            --glass-bg-dark: rgba(30, 30, 32, 0.55);
            --glass-border-light: rgba(255, 255, 255, 0.6);
            --glass-border-dark: rgba(120, 120, 128, 0.2);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            --header-height: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(165deg, #e9ecf2 0%, #d9dee8 100%);
            min-height: 100vh;
            color: #1c1c1e;
            padding-top: var(--header-height);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(145deg, #101114 0%, #1c1c20 100%);
                color: #ffffff;
            }
        }

        /* ----- ЗАФИКСИРОВАННАЯ ВЕРХНЯЯ ПАНЕЛЬ ----- */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow: 0 1px 0 rgba(0,0,0,0.05), inset 0 0 0 0.5px var(--glass-border-light);
            border-bottom: 0.5px solid rgba(255,255,255,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            padding-right: max(20px, env(safe-area-inset-right));
            padding-left: max(20px, env(safe-area-inset-left));
        }
        @media (prefers-color-scheme: dark) {
            .app-header {
                background: var(--glass-bg-dark);
                border-bottom-color: rgba(255,255,255,0.05);
                box-shadow: 0 1px 0 rgba(0,0,0,0.2), inset 0 0 0 0.5px var(--glass-border-dark);
            }
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1c1c1e;
            flex: 1;
        }
        @media (prefers-color-scheme: dark) {
            .header-title {
                color: white;
            }
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow-sm);
            color: var(--primary-blue);
            font-size: 24px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            line-height: 1;
        }
        .header-btn.add-btn {
            font-size: 28px;
            padding-bottom: 4px;
        }
        @media (prefers-color-scheme: dark) {
            .header-btn {
                background: rgba(60,60,65,0.6);
                border-color: rgba(255,255,255,0.1);
                color: #0a84ff;
            }
        }
        .header-btn:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.9);
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        /* Плашка с расходами */
        .monthly-summary {
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--glass-border-light);
            border: 0.5px solid rgba(255,255,255,0.3);
        }
        @media (prefers-color-scheme: dark) {
            .monthly-summary {
                background: var(--glass-bg-dark);
                box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--glass-border-dark);
                border-color: rgba(255,255,255,0.05);
            }
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .summary-label {
            font-size: 17px;
            font-weight: 500;
            opacity: 0.7;
        }
        .summary-amount {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .yearly-row {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 0.5px solid rgba(120,120,128,0.15);
        }
        .yearly-label {
            font-size: 15px;
            opacity: 0.6;
        }
        .yearly-amount {
            font-size: 22px;
            font-weight: 700;
        }

        /* Карточки */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card {
            background: var(--glass-bg-light);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 28px;
            padding: 22px 20px;
            position: relative;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.3s;
            box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--glass-border-light);
            border: 0.5px solid rgba(255,255,255,0.4);
            overflow: hidden;
        }
        @media (prefers-color-scheme: dark) {
            .card {
                background: var(--glass-bg-dark);
                box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--glass-border-dark);
                border-color: rgba(255,255,255,0.08);
            }
        }

        .card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 25%, rgba(255,255,255,0.5) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border-radius: 28px;
        }
        .card:hover::after { opacity: 0.5; }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.6);
        }

        .card-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .card-amount { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
        .card-date { font-size: 15px; opacity: 0.8; margin-bottom: 12px; }
        .card-days { font-size: 44px; font-weight: 800; text-align: right; margin-top: 6px; line-height: 1; }
        .card-days.urgent { color: #ff3b30; text-shadow: 0 0 10px rgba(255,59,48,0.3); }

        .card-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.5);
            border: 0.5px solid rgba(255,255,255,0.8);
        }
        .btn-edit { background: rgba(255,255,255,0.35); }
        .btn-delete { background: rgba(255,59,48,0.15); color: #ff3b30; }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(20px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(40px);
            border-radius: 36px;
            padding: 32px 28px;
            width: 380px;
            max-width: 92vw;
            box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.8);
        }
        @media (prefers-color-scheme: dark) {
            .modal-content { background: rgba(30,30,34,0.85); }
        }

        .form-group { margin-bottom: 22px; }
        .form-group label { font-size: 14px; font-weight: 600; opacity: 0.8; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(120,120,128,0.2);
            border-radius: 20px;
            font-size: 17px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }
        input[type="date"] { text-align: left; }
        .period-quantity-row { display: flex; gap: 12px; }
        .period-select { flex: 2; }
        .quantity-input { flex: 1; }
        .quantity-input input { text-align: center; }

        .form-buttons { display: flex; gap: 14px; margin-top: 28px; }
        .btn-save { background: #007aff; color: white; }
        .btn-cancel { background: rgba(120,120,128,0.15); }

        /* Меню экспорта/импорта */
        .menu-modal .modal-content {
            padding: 24px;
            width: 300px;
        }
        .menu-item {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 500;
            text-align: left;
            backdrop-filter: blur(10px);
            cursor: pointer;
            color: #1c1c1e;
        }
        @media (prefers-color-scheme: dark) {
            .menu-item { background: rgba(60,60,65,0.5); color: white; }
        }
        .menu-item:active { background: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <!-- Хедер с двумя кнопками -->
    <header class="app-header">
        <div class="header-title">Мои подписки</div>
        <div class="header-actions">
            <div class="header-btn menu-btn" onclick="openMenuModal()">⋯</div>
            <div class="header-btn add-btn" onclick="openModal()">+</div>
        </div>
    </header>

    <div class="container">
        <div class="monthly-summary" id="monthlySummary">
            <div class="summary-row">
                <span class="summary-label">В месяц</span>
                <span class="summary-amount" id="totalMonthlyAmount">0 ₽</span>
            </div>
            <div class="yearly-row">
                <span class="yearly-label">В год</span>
                <span class="yearly-amount" id="totalYearlyAmount">0 ₽</span>
            </div>
        </div>
        <div class="cards" id="cards"></div>
    </div>

    <!-- Модалка добавления/редактирования -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom:24px; font-weight:700;">Новая подписка</h2>
            <form id="subscription-form">
                <div class="form-group">
                    <label>Название сервиса</label>
                    <input type="text" id="name" required placeholder="Например, Apple Music">
                </div>
                <div class="form-group">
                    <label>Стоимость (₽)</label>
                    <input type="number" id="amount" min="0" step="0.01" required placeholder="299">
                </div>
                <div class="form-group">
                    <label>Периодичность</label>
                    <div class="period-quantity-row">
                        <select id="period" class="period-select">
                            <option value="week">Неделя</option>
                            <option value="month" selected>Месяц</option>
                            <option value="year">Год</option>
                        </select>
                        <div class="quantity-input">
                            <input type="number" id="period-count" min="1" value="1" step="1" required>
                        </div>
                    </div>
                    <div style="font-size: 13px; opacity: 0.6; margin-top: 4px;">Количество периодов</div>
                </div>
                <div class="form-group">
                    <label>Дата следующего платежа</label>
                    <input type="date" id="next-payment" required>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-save">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Меню экспорта/импорта -->
    <div class="modal menu-modal" id="menuModal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; text-align:center;">Данные</h3>
            <button class="menu-item" onclick="exportData()">📤 Скачать данные (CSV)</button>
            <button class="menu-item" onclick="triggerImport()">📥 Загрузить из файла</button>
            <button class="menu-item" onclick="closeMenuModal()" style="background:rgba(120,120,128,0.2);">Отмена</button>
            <input type="file" id="importFileInput" accept=".csv,text/csv,application/vnd.ms-excel" style="display:none;">
        </div>
    </div>

    <script>
        (function(){
            let subscriptions = JSON.parse(localStorage.getItem('subscriptions')) || [];
            let editingId = null;

            // ---------- Базовые функции ----------
            function saveToStorage() {
                localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            }

            function calculateNextPayment(currentDate, period, count = 1) {
                const next = new Date(currentDate);
                const multiplier = parseInt(count) || 1;
                if (period === 'week') next.setDate(next.getDate() + 7 * multiplier);
                else if (period === 'month') next.setMonth(next.getMonth() + multiplier);
                else if (period === 'year') next.setFullYear(next.getFullYear() + multiplier);
                return next;
            }

            function daysUntil(date) {
                const now = new Date(); now.setHours(0,0,0,0);
                const target = new Date(date); target.setHours(0,0,0,0);
                return Math.ceil((target - now) / (1000*60*60*24));
            }

            function refreshOverdueSubscriptions() {
                let changed = false;
                const today = new Date(); today.setHours(0,0,0,0);
                for (let sub of subscriptions) {
                    let paymentDate = new Date(sub.nextPayment); paymentDate.setHours(0,0,0,0);
                    let days = daysUntil(paymentDate);
                    const count = sub.periodCount || 1;
                    while (days <= 0) {
                        const newDate = calculateNextPayment(paymentDate, sub.period, count);
                        paymentDate = new Date(newDate); paymentDate.setHours(0,0,0,0);
                        days = daysUntil(paymentDate);
                        changed = true;
                    }
                    if (changed) sub.nextPayment = paymentDate.toISOString().split('T')[0];
                }
                if (changed) saveToStorage();
                return changed;
            }

            function calculateMonthlyTotal() {
                return subscriptions.reduce((total, sub) => {
                    const amount = parseFloat(sub.amount) || 0;
                    const count = sub.periodCount || 1;
                    switch (sub.period) {
                        case 'week': return total + ((amount / 7 * 30) / count);
                        case 'month': return total + (amount / count);
                        case 'year': return total + (amount / (12 * count));
                        default: return total;
                    }
                }, 0);
            }

            function updateSummary() {
                const monthly = calculateMonthlyTotal();
                const yearly = monthly * 12;
                const fmt = new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 });
                document.getElementById('totalMonthlyAmount').textContent = fmt.format(monthly) + ' ₽';
                document.getElementById('totalYearlyAmount').textContent = fmt.format(yearly) + ' ₽';
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function getDaysWord(days) {
                const abs = Math.abs(days);
                if (abs % 100 >= 11 && abs % 100 <= 14) return 'дней';
                if (abs % 10 === 1) return 'день';
                if (abs % 10 >= 2 && abs % 10 <= 4) return 'дня';
                return 'дней';
            }

            function renderCards() {
                refreshOverdueSubscriptions();
                const container = document.getElementById('cards');
                const sorted = [...subscriptions].sort((a,b) => daysUntil(new Date(a.nextPayment)) - daysUntil(new Date(b.nextPayment)));
                container.innerHTML = sorted.map(sub => {
                    const days = daysUntil(new Date(sub.nextPayment));
                    const dateStr = new Date(sub.nextPayment).toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
                    const urgent = days <= 3;
                    let periodText = sub.period === 'week' ? 'нед' : (sub.period === 'month' ? 'мес' : 'год');
                    const count = sub.periodCount || 1;
                    if (count > 1) periodText = count + ' ' + periodText;
                    return `
                        <div class="card" onclick="editSubscription('${sub.id}')">
                            <div class="card-title">${escapeHtml(sub.name) || 'Без названия'}</div>
                            <div class="card-amount">${parseFloat(sub.amount).toFixed(0)} ₽ / ${periodText}</div>
                            <div class="card-date">📅 ${dateStr}</div>
                            <div class="card-days ${urgent ? 'urgent' : ''}">${days} ${getDaysWord(days)}</div>
                            <div class="card-buttons">
                                <button class="btn btn-edit" onclick="event.stopPropagation(); editSubscription('${sub.id}')">Изменить</button>
                                <button class="btn btn-delete" onclick="event.stopPropagation(); deleteSubscription('${sub.id}')">Удалить</button>
                            </div>
                        </div>
                    `;
                }).join('');
                updateSummary();
            }

            // ---------- Экспорт / Импорт ----------
            function convertToCSV() {
                const headers = ['id', 'name', 'amount', 'period', 'periodCount', 'nextPayment'];
                const rows = subscriptions.map(sub => [
                    sub.id,
                    sub.name,
                    sub.amount,
                    sub.period,
                    sub.periodCount || 1,
                    sub.nextPayment
                ]);
                const csvContent = [headers, ...rows].map(row => 
                    row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
                ).join('\n');
                return csvContent;
            }

            window.exportData = function() {
                const csv = convertToCSV();
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }); // BOM для Excel
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `subscriptions_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                closeMenuModal();
            };

            window.triggerImport = function() {
                document.getElementById('importFileInput').click();
                closeMenuModal();
            };

            function parseCSV(text) {
                const lines = text.split('\n').filter(line => line.trim());
                if (lines.length < 2) return [];
                const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                const data = [];
                for (let i = 1; i < lines.length; i++) {
                    const values = [];
                    let inQuotes = false;
                    let current = '';
                    for (let char of lines[i]) {
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { values.push(current); current = ''; }
                        else current += char;
                    }
                    values.push(current);
                    const cleanValues = values.map(v => v.replace(/^"|"$/g, '').trim());
                    if (cleanValues.length !== headers.length) continue;
                    const obj = {};
                    headers.forEach((h, idx) => { obj[h] = cleanValues[idx]; });
                    // Преобразование типов
                    obj.amount = parseFloat(obj.amount) || 0;
                    obj.periodCount = parseInt(obj.periodCount) || 1;
                    data.push(obj);
                }
                return data;
            }

            document.getElementById('importFileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = parseCSV(ev.target.result);
                        if (imported.length === 0) { alert('Файл пуст или неверный формат'); return; }
                        if (confirm(`Заменить текущие подписки (${subscriptions.length}) на ${imported.length} из файла?`)) {
                            subscriptions = imported;
                            saveToStorage();
                            renderCards();
                        }
                    } catch (err) {
                        alert('Ошибка чтения файла');
                    }
                    e.target.value = '';
                };
                reader.readAsText(file, 'UTF-8');
            });

            // ---------- Модалки ----------
            window.openMenuModal = () => document.getElementById('menuModal').classList.add('active');
            window.closeMenuModal = () => document.getElementById('menuModal').classList.remove('active');

            window.openModal = function(id = null) {
                editingId = id;
                const modal = document.getElementById('modal');
                const title = document.getElementById('modal-title');
                const form = document.getElementById('subscription-form');
                if (id) {
                    const sub = subscriptions.find(s => s.id === id);
                    if (sub) {
                        document.getElementById('name').value = sub.name;
                        document.getElementById('amount').value = sub.amount;
                        document.getElementById('period').value = sub.period;
                        document.getElementById('period-count').value = sub.periodCount || 1;
                        document.getElementById('next-payment').value = sub.nextPayment;
                        title.textContent = 'Изменить подписку';
                    }
                } else {
                    form.reset();
                    document.getElementById('period-count').value = 1;
                    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
                    document.getElementById('next-payment').valueAsDate = tomorrow;
                    title.textContent = 'Новая подписка';
                }
                modal.classList.add('active');
            };

            window.closeModal = () => document.getElementById('modal').classList.remove('active');

            document.getElementById('subscription-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('name').value.trim();
                const amount = parseFloat(document.getElementById('amount').value) || 0;
                const period = document.getElementById('period').value;
                const periodCount = parseInt(document.getElementById('period-count').value) || 1;
                const nextPayment = document.getElementById('next-payment').value;
                if (!name || amount <= 0) { alert('Введите название и стоимость'); return; }
                const data = { id: editingId || Date.now().toString(36) + Math.random().toString(36).substr(2,6), name, amount, period, periodCount, nextPayment };
                if (editingId) {
                    const idx = subscriptions.findIndex(s => s.id === editingId);
                    if (idx !== -1) subscriptions[idx] = data;
                } else subscriptions.push(data);
                saveToStorage();
                closeModal();
                renderCards();
            });

            window.editSubscription = (id) => openModal(id);
            window.deleteSubscription = (id) => {
                if (confirm('Удалить подписку?')) {
                    subscriptions = subscriptions.filter(s => s.id !== id);
                    saveToStorage();
                    renderCards();
                }
            };

            // SW
            if ('serviceWorker' in navigator) {
                const swCode = `const CACHE='subs-v5';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
                const blob = new Blob([swCode], {type:'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
            }

            renderCards();
            setInterval(() => { if (refreshOverdueSubscriptions()) renderCards(); else renderCards(); }, 3600000);
            document.addEventListener('visibilitychange', () => { if (!document.hidden) renderCards(); });
        })();
    </script>
</body>
</html>
