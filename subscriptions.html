<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Отслеживание подписок</title>
    <link rel="manifest" href="application/manifest+json,{
        &quot;name&quot;: &quot;Подписки&quot;,
        &quot;short_name&quot;: &quot;Subscriptions&quot;,
        &quot;start_url&quot;: &quot;./&quot;,
        &quot;display&quot;: &quot;standalone&quot;,
        &quot;background_color&quot;: &quot;#ffffff&quot;,
        &quot;theme_color&quot;: &quot;#007aff&quot;,
        &quot;icons&quot;: [{
            &quot;src&quot;: &quot;image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjMDA3YWZmIi8+CjxwYXRoIGQ9Ik0xMjAgODBDMTIwIDY5LjQ0OCA5MC41NTIgNDggNjQgNDhDOC4yODQzIDQ4IDAgNTYuMjg0MyAwIDgzLjk2OUMwIDExMS42MzUgOC4yODQzIDEyMCA2NCAxMjBDMTE5LjcxNiAxMjAgMTI4IDEuMTEwNSUxMjggODBaIiBmaWxsPSJ3aGl0ZSIvPgo8L3N2Zz4=&quot;,
            &quot;sizes&quot;: &quot;192x192&quot;,
            &quot;type&quot;: &quot;image/svg+xml&quot;
        }]
    }">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Подписки">
    <meta name="theme-color" content="#007aff">
    <style>
        :root {
            --primary-blue: #007aff;
            --bg-color: #f2f2f7;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: #000;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-blue), #0051d4);
            color: white;
            border: none;
            font-size: 24px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            z-index: 1000;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--card-shadow);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .card.editing {
            background: rgba(255,255,255,0.95);
            color: #000;
            backdrop-filter: blur(20px);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-amount {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card-date {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .card-days {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-top: 12px;
        }
        .card-days.urgent {
            color: #ff3b30;
        }
        .card-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-edit { background: rgba(255,255,255,0.3); color: white; }
        .btn-delete { background: rgba(255,59,48,0.8); color: white; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e5e7;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }
        .form-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-save { background: var(--primary-blue); color: white; flex: 1; }
        .btn-cancel { background: #e5e5e7; color: #000; flex: 1; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            margin: 20px;
        }
        @media (prefers-color-scheme: dark) {
            body { --bg-color: #000; color: #fff; }
            .card.editing { background: rgba(28,28,30,0.95); color: #fff; }
            .form-group input, .form-group select { background: #1c1c1e; color: #fff; border-color: #38383a; }
            .btn-cancel { background: #38383a; color: #fff; }
        }
        @supports (padding: max(0px)) {
            body { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Подписки</h1>
        <div class="cards" id="cards"></div>
    </div>
    <button class="add-btn" onclick="openModal()">+</button>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Новая подписка</h2>
            <form id="subscription-form">
                <div class="form-group">
                    <label>Название сервиса</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Стоимость (₽)</label>
                    <input type="number" id="amount" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Периодичность</label>
                    <select id="period">
                        <option value="week">Неделя</option>
                        <option value="month" selected>Месяц</option>
                        <option value="year">Год</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Дата следующего платежа</label>
                    <input type="date" id="next-payment" required>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-save">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let subscriptions = JSON.parse(localStorage.getItem('subscriptions')) || [];
        let editingId = null;

        function saveSubscriptions() {
            localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            renderCards();
        }

        function calculateNextPayment(currentDate, period) {
            const next = new Date(currentDate);
            if (period === 'week') {
                next.setDate(next.getDate() + 7);
            } else if (period === 'month') {
                next.setMonth(next.getMonth() + 1);
            } else if (period === 'year') {
                next.setFullYear(next.getFullYear() + 1);
            }
            return next;
        }

        function daysUntil(date) {
            const now = new Date();
            const diffTime = date - now;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function renderCards() {
            const container = document.getElementById('cards');
            // Сортировка по дням до платежа (возрастание)
            const sorted = [...subscriptions].sort((a, b) => daysUntil(new Date(a.nextPayment)) - daysUntil(new Date(b.nextPayment)));
            
            container.innerHTML = sorted.map(sub => {
                const days = daysUntil(new Date(sub.nextPayment));
                const dateStr = new Date(sub.nextPayment).toLocaleDateString('ru-RU');
                const urgent = days <= 3;
                return `
                    <div class="card" onclick="editSubscription('${sub.id}')">
                        <div class="card-title">${sub.name}</div>
                        <div class="card-amount">${sub.amount} ₽</div>
                        <div class="card-date">Следующий платеж: ${dateStr}</div>
                        <div class="card-days ${urgent ? 'urgent' : ''}">${days} дней</div>
                        <div class="card-buttons">
                            <button class="btn btn-edit" onclick="event.stopPropagation(); editSubscription('${sub.id}')">Изменить</button>
                            <button class="btn btn-delete" onclick="event.stopPropagation(); deleteSubscription('${sub.id}')">Удалить</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id = null) {
            editingId = id;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('subscription-form');
            
            if (id) {
                const sub = subscriptions.find(s => s.id === id);
                document.getElementById('name').value = sub.name;
                document.getElementById('amount').value = sub.amount;
                document.getElementById('period').value = sub.period;
                document.getElementById('next-payment').value = sub.nextPayment;
                title.textContent = 'Изменить подписку';
            } else {
                form.reset();
                document.getElementById('next-payment').valueAsDate = new Date();
                title.textContent = 'Новая подписка';
            }
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingId = null;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        document.getElementById('subscription-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                id: editingId || generateId(),
                name: document.getElementById('name').value,
                amount: parseFloat(document.getElementById('amount').value),
                period: document.getElementById('period').value,
                nextPayment: document.getElementById('next-payment').value
            };
            
            if (editingId) {
                const index = subscriptions.findIndex(s => s.id === editingId);
                subscriptions[index] = data;
            } else {
                subscriptions.push(data);
            }
            
            saveSubscriptions();
            closeModal();
        });

        function editSubscription(id) {
            openModal(id);
        }

        function deleteSubscription(id) {
            if (confirm('Удалить подписку?')) {
                subscriptions = subscriptions.filter(s => s.id !== id);
                saveSubscriptions();
            }
        }

        // Инициализация
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('text/javascript;base64,' + btoa(`
                self.addEventListener('install', e => {
                    e.waitUntil(
                        caches.open('subscriptions-v1').then(cache => cache.addAll(['./']))
                    );
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(response => response || fetch(e.request)));
                });
            `));
        }

        renderCards();
    </script>
</body>
</html>
